<!DOCTYPE html>
<html>
<head>
    <title>Marks List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2>Marks List</h2>

    <a href="{% url 'add_mark' %}" class="btn btn-success mb-3">
        Add Marks
    </a>

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Student</th>
                <th>Subject</th>
                <th>Internal</th>
                <th>External</th>
                <th>Total</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>
        {% for mark in marks %}
            <tr>
                <td>{{ mark.student }}</td>
                <td>{{ mark.subject }}</td>
                <td>{{ mark.internal }}</td>
                <td>{{ mark.external }}</td>
                <td>{{ mark.total }}</td>
                <td>
                    <a href="{% url 'edit_mark' mark.id %}" class="btn btn-primary btn-sm">Edit</a>
                    <a href="{% url 'delete_mark' mark.id %}" class="btn btn-danger btn-sm">Delete</a>
                </td>
            </tr>
        {% empty %}
            <tr>
                <td colspan="6" class="text-center">No Marks Available</td>
            </tr>
        {% endfor %}
        </tbody>
    </table>

</div>

</body>
</html>
