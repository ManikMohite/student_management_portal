<!DOCTYPE html>
<html>

<head>

<title>My Marks</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2>My Marks</h2>

<table class="table table-bordered">

<tr>

<th>Subject</th>

<th>Internal</th>

<th>External</th>

<th>Total</th>

</tr>

{% for mark in marks %}

<tr>

<td>{{ mark.subject }}</td>

<td>{{ mark.internal }}</td>

<td>{{ mark.external }}</td>

<td>{{ mark.total }}</td>

</tr>

{% endfor %}

</table>

</div>

</body>

</html>
