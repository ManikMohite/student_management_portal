<!DOCTYPE html>
<html>

<head>

<title>Attendance</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2>Attendance</h2>

<a href="{% url 'add_attendance' %}" class="btn btn-success mb-3">

Add Attendance

</a>

<table class="table table-bordered">

<tr>

<th>Student</th>
<th>Date</th>
<th>Status</th>
<th>Action</th>

</tr>

{% for a in attendance %}

<tr>

<td>{{ a.student.user.first_name }}</td>

<td>{{ a.date }}</td>

<td>{{ a.status }}</td>

<td>

<a href="{% url 'edit_attendance' a.id %}" class="btn btn-warning btn-sm">

Edit

</a>

<a href="{% url 'delete_attendance' a.id %}" class="btn btn-danger btn-sm">

Delete

</a>

</td>

</tr>

{% endfor %}

</table>

</div>

</body>

</html>
